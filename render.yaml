services:
  - type: web
    name: auto-mailer-prod
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn web_app:app --worker-class sync --workers 1 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: WEB_THREADS
        value: 4
