<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — AutoMailer Studio</title>
  <link rel="icon" type="image/svg+xml" href="/static/web/favicon.svg">
  <link rel="stylesheet" href="/static/web/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="glass-body">

  <nav class="navbar glass-nav">
    <a href="/" class="nav-brand">
      <img src="/static/web/favicon.svg" alt="Logo" style="height:22px;filter:invert(1);"> Auto-Mailer
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link">Studio</a>
      <a href="/dashboard" class="nav-link active">Analytics</a>
      <a href="/docs" class="nav-link">Docs</a>
    </div>
    <div style="flex:1;"></div>
    <div class="nav-links">
      <button id="manageUnsubsBtn" class="nav-link" style="background:none;border:none;cursor:pointer;font:inherit;">Manage Unsubscribes</button>
    </div>
  </nav>

  <!-- Unsubscribe Manager Modal -->
  <div id="unsubModal" class="glass-modal">
    <div class="glass-modal-content" style="max-width:800px;">
      <div class="modal-header">
        <h2>Unsubscribe Management</h2>
        <button class="close-modal" id="closeUnsubModal">&times;</button>
      </div>
      <p style="opacity:0.7; margin-bottom:1.5rem;">Emails in this list are blocked from all future campaigns. Delete an entry to re-enable them.</p>
      <div id="unsubListContainer">
        <!-- Table injected by JS -->
      </div>
    </div>
  </div>

  <div class="dashboard-shell">
    <div class="dash-header">
      <div>
        <p>Analytics Matrix</p>
        <h1>Campaign Dashboard</h1>
      </div>
      <div style="display:flex; gap:12px; align-items:center;">
        <button id="refreshBtn" class="btn" title="Refresh analytics and scan for new bounces">
          <span>🔄</span> Refresh & Scan
        </button>
      </div>
    </div>

    <!-- Global Analysis Section -->
    <div class="global-analysis-grid">
      <div class="summary-bar" id="summaryBar">
        <!-- Injected by JS -->
      </div>
      <div class="chart-box glass-card" style="padding:24px; min-width:320px;">
        <h3 style="margin:0 0 16px; font-size:0.9rem; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.1em;">Aggregate Engagement Funnel</h3>
        <canvas id="globalFunnelChart" width="240" height="240"></canvas>
      </div>
    </div>

    <!-- Per-campaign cards -->
    <div class="campaigns-grid" id="campaignsContainer">
      <div class="no-campaigns-msg">Loading campaign data…</div>
    </div>
  </div>

  <script src="/static/web/utils.js"></script>
  <script src="/static/web/dashboard.js"></script>
</body>
</html>
